---
# yamllint disable rule:line-length
name: latexmk
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: latexmk-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: sh
jobs:
  latexmk:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: yegor256/latexmk-action@0.20.0
        with:
          cmd: >-
            (curl -fsSL https://deb.nodesource.com/setup_18.x | sh) &&
            apt-get install --yes nodejs &&
            apt-get install --yes openjdk-17-jdk &&
            wget -q -O /usr/bin/phino http://phino.objectionary.com/releases/ubuntu-24.04/phino-latest &&
            chmod a+x /usr/bin/phino &&
            phino --version &&
            npm install -g eolang &&
            latexmk
          opts: -pdf
          depends: DEPENDS.txt
      - if: github.event_name == 'push'
        run: mkdir -p gh-pages && cp paper.pdf gh-pages/paper.pdf
      - if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          keep_files: true
